<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Questionnaire Emosson</title>
    <link rel="stylesheet" href="../static/css/style.css">

</head>

<body>
    <header>
        <div class="header-container">

     
            <img src="../static/img/castor_emosson.png" alt="logo">

            
            <h1>Emosson - Diagnostic</h1>
            <a href="/accueil" class="btn">Retourner à l'accueil</a>

        </div>
    </header>

    <div class="progress-bar-container">
        <div class="progress-bar" id="globalProgress"></div>
    </div>
    <div class="container">

        <form action="/calcul" method="get" id="diagnostic-form">

            <div id="form-steps">
                {% for etape in etapes %}
                <div class="critere-block
                    {% if loop.first %}
                        unlocking
                    {% else %}
                        locked
                    {% endif %}"
                    data-step="{{ loop.index0 }}">
                    <div class="critere-header">
                        {{ etape.critere }}
                    </div>

                    <p>
                        {{ etape.question }}
                        {% if etape.type == 'select' %}
                        <select name="{{ etape.name }}" required class="step-input">

                         
                            <option value="" disabled selected>-- Choisir --</option>

                            {% for index, rep in etape.options %}

                            <option value="{{ index }}">{{ rep }}</option>
                            {% endfor %}

                        </select>

                        {% elif etape.type == 'number' %}
                        <input type="number"
                               name="{{ etape.name }}"
                               step="0.01"
                               placeholder="{{ etape.placeholder }}"
                               required
                               class="step-input">

                        {% else %}
                        <input type="text"
                               name="{{ etape.name }}"
                               placeholder="{{ etape.placeholder }}"
                               {% if etape.pattern %}pattern="{{ etape.pattern }}"{% endif %}
                               required
                               class="step-input">

                        {% endif %}
                    </p>

                </div>
                {% endfor %}

            </div>


            <!-- ===== BOUTONS DE NAVIGATION ===== -->
            <div class="navigation-buttons">
                <button type="button" id="bouton_prec" class="btn" style="display: none;">
                    Précédent
                </button>

                <div style="flex-grow: 1;"></div>
            
                <button type="button" id="bouton_suiv" class="btn" disabled>
                    Suivant
                </button>

                <button type="submit" id="bouton_valider" style="display: none;">
                    Calculer mon score
                </button>
            </div>
        </form>
    </div>
    <footer>

        <p>&copy; {{ now.year }} Emosson. Tous droits réservés.</p>
    </footer>

    <script>
    document.addEventListener("DOMContentLoaded", function() {


        const steps = document.querySelectorAll('.critere-block'); 
        const bouton_precedent = document.getElementById('bouton_prec');       
        const bouton_suivant = document.getElementById('bouton_suiv');       
        const bouton_valider = document.getElementById('bouton_valider');      
        const progressBar = document.getElementById('globalProgress');   
        const form = document.getElementById('diagnostic-form');  

    
              
        

        const stap_max = etapes.length; 
        let CurrentStep = 0;       
        function updateUI() {
            steps.forEach(function(step, i) {
                if (i === CurrentStep) {
                    step.classList.remove('locked');
                    step.classList.add('unlocking');
                } else {
                    step.classList.remove('unlocking');
                    step.classList.add('locked');
                }
            });
            const progressPct = (CurrentStep / (etapes.length - 1)) * 100;
            progressBar.style.height = progressPct + '%';

    
            if (CurrentStep === 0) {
                bouton_precedent.style.display = 'none';
            } else {
                bouton_precedent.style.display = 'inline-block';
            }

         
            if (CurrentStep === totalSteps - 1) {
        
                bouton_suivant.style.display = 'none';
                bouton_valider.style.display = 'inline-block';
            } else {
                
                bouton_suivant.style.display = 'inline-block';
                bouton_valider.style.display = 'none';
            }
            checkValidity();
        }



        function checkValidity() {
            const currentInput = steps[CurrentStep].querySelector('.step-input');
            const isValid = currentInput.checkValidity() && currentInput.value.trim() !== '';

            bouton_suivant.disabled = !isValid;
            if (CurrentStep ===  etapes.length - 1) {
                bouton_suivant.disabled = !isValid;
            }
        }
        steps.forEach(function(step) {

            const input = step.querySelector('.step-input');
            input.addEventListener('input', checkValidity);
            input.addEventListener('change', function() {
                checkValidity();

                const isSelect = input.tagName.toLowerCase() === 'select';
                if (isSelect && input.checkValidity()) {
                    setTimeout(function() {
                        if (currentStep < etapes.length - 1) {
                            currentStep++;
                            updateUI();
                        }
                    }, 300); 
                }
            });

            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault(); 
                    if (!btnNext.disabled && currentStep < etapes.length - 1) {
                        currentStep++;
                        updateUI();
                    } else if (currentStep === etapes.length - 1 && !btnSubmit.disabled) {
                        form.submit();
                    }
                }
            });
        });


        // ajout des cliques

        bouton_suivant.addEventListener('click', function() {
            if (currentStep < totalSteps - 1) {
                currentStep++;
                updateUI();
            }
        });

        bouton_precedent.addEventListener('click', function() {
            if (currentStep > 0) {
                currentStep--;
                updateUI();
            }
        });

        updateUI();

    }); 

    </script>

</body>
</html>
